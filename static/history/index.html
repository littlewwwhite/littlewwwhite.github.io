<script>
const HISTORY_APP_DATA = {"sources": [{"source_key": "ai-blogs", "display_name": "AI 博客", "source_type": "blog", "days": [{"brief_date": "2026-06-16", "published_at": "2026-06-16T00:06:23+00:00", "section_title": "AI 博客", "source_type": "blog", "item_count": 2, "intro": "", "items": [{"item_index": 1, "title": "人工智能尚未取代软件工程师，未来也不会", "source_label": "", "score": "", "takeaway": "Simon Willison 直指“AI 快替代程序员”的叙事过度简化，强调真实瓶颈在需求理解、系统设计、协作与责任闭环。", "reason": "", "keywords": "", "url": "", "raw_text": "1. 人工智能尚未取代软件工程师，未来也不会\n看点：Simon Willison 直指“AI 快替代程序员”的叙事过度简化，强调真实瓶颈在需求理解、系统设计、协作与责任闭环。\n为什么值得看：这篇最适合给所有正在重估开发者角色的人校准预期，观点克制但很扎实｜原文：https://simonwillison.net/2026/Jun/14/why-ai-hasnt-replaced-software-engineers/#atom-everything"}, {"item_index": 2, "title": "AI 的破碎经济学", "source_label": "", "score": "", "takeaway": "从成本、商业模式和价值兑现三条线审视当下 AI 产业，核心判断是技术进步很快，但经济回报结构并不健康。", "reason": "", "keywords": "", "url": "", "raw_text": "2. AI 的破碎经济学\n看点：从成本、商业模式和价值兑现三条线审视当下 AI 产业，核心判断是技术进步很快，但经济回报结构并不健康。\n为什么值得看：如果你更关心 AI 行业接下来是继续狂奔还是进入出清，这篇比产品发布会更有信号｜原文：https://www.wheresyoured.at/brokenomics/"}], "raw_file_name": "brief-20260616.txt", "source_overview": "AI 博客 · GitHub Trending · papers.cool/arxiv"}, {"brief_date": "2026-06-15", "published_at": "2026-06-15T00:00:00+00:00", "section_title": "AI 博客", "source_type": "blog", "item_count": 3, "intro": "", "items": [{"item_index": 1, "title": "美国商务部实质性叫停 Anthropic 最新模型对外提供", "source_label": "", "score": "", "takeaway": "美国以国家安全为由要求暂停 Fable 5 和 Mythos 5 面向外国国民的访问，属于罕见且影响深远的 AI 出口管制动作。", "reason": "", "keywords": "", "url": "", "raw_text": "1. 美国商务部实质性叫停 Anthropic 最新模型对外提供\n看点：美国以国家安全为由要求暂停 Fable 5 和 Mythos 5 面向外国国民的访问，属于罕见且影响深远的 AI 出口管制动作。\n为什么值得看：这不是普通产品更新，而是会直接影响模型供给、国际合作和后续监管走向的重要信号｜原文：https://garymarcus.substack.com/p/breaking-news-us-commerce-department"}, {"item_index": 2, "title": "为什么 AI 还没有取代软件工程师，而且短期内也不会", "source_label": "", "score": "", "takeaway": "文章针对“AI 很快导致程序员大规模失业”的流行叙事做了系统反驳，强调当前工具能力与真实工程工作的落差。", "reason": "", "keywords": "", ni 的观点，指出很多 AI agent 的问题不在“不像人”，而在于它们把人类常见的敷衍、走捷径和自我合理化也学了过去。\n推荐理由：如果你最近在做 coding agent、workflow agent 或自动化助手，这篇很适合作为产品反思：代理失败，往往不是模型不够强，而是行为模式不够可靠。\n关键词：AI agents、human-like、frustration\n原文：https://simonwillison.net/2026/Apr/21/andreas-pahlsson-notini/#atom-everything"}, {"item_index": 3, "title": "Claude Code 正从 Pro 套餐中被移出", "source_label": "wheresyoured.at", "score": "22/30", "takeaway": "Anthropic 似乎已将新用户的 Claude Code 从 20 美元/月的 Pro 方案中移除，相关能力正向更高阶套餐集中。", "reason": "这直接影响 AI 编码工具的使用门槛和团队预算，也说明“模型能力”之外，商业化与配额设计正在成为开发者工具选型的重要变量。", "keywords": "Anthropic、Claude Code、AI subscription", "url": "https://www.wheresyoured.at/news-anthropic-removes-pro-cc/", "raw_text": "3. Claude Code 正从 Pro 套餐中被移出\n来源：wheresyoured.at｜评分：22/30\n看点：Anthropic 似乎已将新用户的 Claude Code 从 20 美元/月的 Pro 方案中移除，相关能力正向更高阶套餐集中。\n推荐理由：这直接影响 AI 编码工具的使用门槛和团队预算，也说明“模型能力”之外，商业化与配额设计正在成为开发者工具选型的重要变量。\n关键词：Anthropic、Claude Code、AI subscription\n原文：https://www.wheresyoured.at/news-anthropic-removes-pro-cc/"}, {"item_index": 4, "title": "不要把聊天机器人当医疗顾问", "source_label": "garymarcus.substack.com", "score": "22/30", "takeaway": "文中汇总了 4 项独立研究，结论高度一致：当前聊天机器人在医疗建议场景里仍有明显误导风险。", "reason": "这篇很适合所有做 RAG、知识助手和垂直 AI 应用的人看——它提醒我们，高风险场景里“回答得像回事”远远不等于“可以放心上线”。", "keywords": "chatbot、medical advice、AI safety", "url": "https://garymarcus.substack.com/p/please-dont-trust-your-chatbot-for", "raw_text": "4. 不要把聊天机器人当医疗顾问\n来源：garymarcus.substack.com｜评分：22/30\n看点：文中汇总了 4 项独立研究，结论高度一致：当前聊天机器人在医疗建议场景里仍有明显误导风险。\n推荐理由：这篇很适合所有做 RAG、知识助手和垂直 AI 应用的人看——它提醒我们，高风险场景里“回答得像回事”远远不等于“可以放心上线”。\n关键词：chatbot、medical advice、AI safety\n原文：https://garymarcus.substack.com/p/please-dont-trust-your-chatbot-for"}, {"item_index": 5, "title": "llm-openrouter 0.6 发布", "source_label": "simonwillison.net", "score": "20/30", "takeaway": "新版本加入 `llm openrouter refresh`，可以不等缓存过期就刷新可用模型列表，更快尝试新模型。", "reason": "虽然是个小更新，但对经常切换模型、做评测或搭本地/CLI 工作流的人很实用，能明显降低试新模型时的摩擦成本。", "keywords": "llm-openrouter、CLI tool、model refresh", "url": "https://simonwillison.net/2026/Apr/20/llm-openrouter/#atom-everything", "raw_text": "5. llm-openrouter 0.6 发布\n来源：simonwillison.net｜评分：20/30\n看点：新版本加入 `llm openrouter refresh`，可以不等缓存过期就刷新可用模型列表，更快尝试新模型。\n推荐理由：虽然是个小更新，但对经常切换模型、做评测或搭本地/CLI 工作流的人很实用，能明显降低试新模型时的摩擦成本。\n关键词：llm-openrouter、CLI tool、model refresh\n原文：https://simonwillison.net/2026/Apr/20/llm-openrouter/#atom-everything"}], "raw_file_name": "brief-20260422.txt", "source_overview": "AI 博客 Top 5"}, {"brief_date": "2026-04-21", "published_at": "2026-04-21T00:00:00+00:00", "section_title": "AI 博客 Top 5", "source_type": "blog", "item_count": 4, "intro": "🌅 AI 晨报｜Top 5 精读\n今天的信号很集中：AI 产品开始更认真地面对成本与权限边界，个人 AI 的交互形态也在往更轻、更稳的“无头化”演进。对做模型应用、AI 工具或企业智能体的人来说，这几篇都很值得晨读。", "items": [{"item_index": 1, "title": "微软将 GitHub Copilot 用户转向基于 Token 的计费并收紧速率限制", "source_label": "wheresyoured.at", "score": "27/30", "takeaway": "Copilot 可能从按请求走向按 Token 计费，同时收紧速率限制，背后反映的是 AI 编程助手的推理成本与商业模式压力。", "reason": "如果你在做 AI Coding、开发者工具或付费模型产品，这篇很适合用来判断行业接下来会怎么定价、限流和做套餐设计。", "keywords": "GitHub Copilot、Token 计费、速率限制、AI 工具", "url": "https://www.wheresyoured.at/news-microsoft-to-shift-github-copilot-users-to-token-based-billing-reduce-rate-limits-2/", "raw_text": "1. 微软将 GitHub Copilot 用户转向基于 Token 的计费并收紧速率限制\n来源：wheresyoured.at｜评分：27/30\n看点：Copilot 可能从按请求走向按 Token 计费，同时收紧速率限制，背后反映的是 AI 编程助手的推理成本与商业模式压力。\n推荐理由：如果你在做 AI Coding、开发者工具或付费模型产品，这篇很适合用来判断行业接下来会怎么定价、限流和做套餐设计。\n关键词：GitHub Copilot、Token 计费、速率限制、AI 工具\n原文：https://www.wheresyoured.at/news-microsoft-to-shift-github-copilot-users-to-token-based-billing-reduce-rate-limits-2/"}, {"item_index": 2, "title": "个人 AI 的无头化一切", "source_label": "simonwillison.net", "score": "26/30", "takeaway": "文章提出“无头服务”会成为个人 AI 的重要基础设施，让 AI 直接调用能力层，而不是绕着图形界面操作。", "reason": "这对 Agent 设计很有启发——真正可扩展的个人 AI，核心不是会不会点按钮，而是有没有稳定、可编排、低摩擦的接口。", "keywords": "Personal AI、Headless Services、AI Agents、用户体验", "url": "https://simonwillison.net/2026/Apr/19/headless-everything/#atom-everything", "raw_text": "2. 个人 AI 的无头化一切\n来源：simonwillison.net｜评分：26/30\n看点：文章提出“无头服务 (function(){
  const FAVORITES_KEY = 'ai-daily-digest-favorites-v1';
  const tabsEl = document.getElementById('history-tabs');
  const sidebarTitleEl = document.getElementById('history-sidebar-title');
  const sidebarSubtitleEl = document.getElementById('history-sidebar-subtitle');
  const directoryEl = document.getElementById('history-directory');
  const detailEl = document.getElementById('history-detail');
  const emptyState = document.getElementById('history-empty');
  const favoritesBtn = document.getElementById('history-favorites-btn');
  const favoritesOnlyBtn = document.getElementById('history-favorites-only-btn');
  let favorites = loadFavorites();
  let favoritesOnly = false;

  function esc(value){
    return String(value ?? '').replace(/[&<>"']/g, function(ch){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
    });
  }

  function formatDateLabel(date){
    return date || '';
  }

  function loadFavorites(){
    try {
      const raw = window.localStorage.getItem(FAVORITES_KEY);
      if (!raw) return {};
      const parsed = JSON.parse(raw);
      return parsed && typeof parsed === 'object' ? parsed : {};
    } catch (err) {
      return {};
    }
  }

  function saveFavorites(){
    window.localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites));
  }

  function updateFavoritesBadge(){
    const count = Object.keys(favorites).length;
    if (favoritesBtn) favoritesBtn.textContent = '★ 收藏 ' + count;
    if (favoritesOnlyBtn) favoritesOnlyBtn.classList.toggle('active', favoritesOnly);
  }

  function getItemId(source, day, item){
    return [source.source_key, day.brief_date, item.item_index, item.url || item.title].join('::');
  }

  function isFavorite(itemId){
    return Boolean(favorites[itemId]);
  }

  function toggleFavorite(itemId, payload){
    if (favorites[itemId]) {
      delete favorites[itemId];
    } else {
      favorites[itemId] = payload;
    }
    saveFavorites();
    updateFavoritesBadge();
    render();
  }

  function getStateFromUrl(){
    const url = new URL(window.location.href);
    return {
      source: url.searchParams.get('source') || '',
      date: url.searchParams.get('date') || ''
    };
  }

  function setStateInUrl(sourceKey, date){
    const url = new URL(window.location.href);
    url.searchParams.set('source', sourceKey);
    if (date) {
      url.searchParams.set('date', date);
    } else {
      url.searchParams.delete('date');
    }
    window.history.replaceState({}, '', url.toString());
  }

  function resolveState(){
    const state = getStateFromUrl();
    const sources = HISTORY_APP_DATA.sources || [];
    let source = sources.find(s => s.source_key === state.source) || sources[0] || null;
    if (!source) return {source:null, day:null};
    let day = source.days.find(d => d.brief_date === state.date) || source.days[0] || null;
    return {source, day};
  }

  function renderTabs(activeSourceKey){
    tabsEl.innerHTML = '';
    (HISTORY_APP_DATA.sources || []).forEach(source => {
      const btn = document.createElement('button');
      btn.className = 'history-tab' + (source.source_key === activeSourceKey ? ' active' : '');
      btn.type = 'button';
      btn.textContent = source.display_name;
      btn.addEventListener('click', () => {
        const nextDay = (source.days && source.days[0]) ? source.days[0].brief_date : '';
        setStateInUrl(source.source_key, nextDay);
        render();
      });
      tabsEl.appendChild(btn);
    });
  }

  function renderDirectory(source, activeDate){
    sidebarTitleEl.textContent = source.display_name;
    sidebarSubtitleEl.textContent = source.day_count + ' 天归档';
    directoryEl.innerHTML = '';
    source.days.forEach(day => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'history-dir-item' + (day.brief_date === activeDate ? ' active' : '');
      btn.innerHTML = '<div class="history-dir-title">' + esc(formatDateLabel(day.brief_date)) + '</div>' +
        '<div class="history-dir-meta"><span>' + esc(String(day.item_count)) + ' 条</span></div>';
      btn.addEventListener('click', () => {
        setStateInUrl(source.source_key, day.brief_date);
        render();
      });
      directoryEl.appendChild(btn);
    });
  }

  function renderItems(source, day, items){
    if (!items || !items.length) {
      return '<p class="history-detail-subtitle">暂无条目。</p>';
    }
    const filteredItems = favoritesOnly
      ? items.filter(item => isFavorite(getItemId(source, day, item)))
      : items;
    if (!filteredItems.length) {
      return '<p class="history-detail-subtitle">当前筛选下暂无已收藏条目。</p>';
    }
    const midpoint = Math.ceil(filteredItems.length / 2);
    const columns = [filteredItems.slice(0, midpoint), filteredItems.slice(midpoint)];
    function renderCard(item){
      const itemId = getItemId(source, day, item);
      const favored = isFavorite(itemId);
      const title = item.url
        ? '<a href="' + esc(item.url) + '" target="_blank" rel="noopener noreferrer">' + esc(item.item_index + '. ' + item.title) + '</a>'
        : esc(item.item_index + '. ' + item.title);
      const takeaway = item.takeaway ? '<p><strong>看点：</strong>' + esc(item.takeaway) + '</p>' : '';
      const reason = item.reason && item.reason !== item.takeaway ? '<p><strong>推荐理由：</strong>' + esc(item.reason) + '</p>' : '';
      const sourceMeta = (source.source_type !== 'papers' && item.source_label) ? '<span class="history-item-source">' + esc(item.source_label) + '</span>' : '';
      const score = item.score ? '<span class="history-item-score">' + esc(item.score) + '</span>' : '';
      const favorite = '<button class="history-item-fav' + (favored ? ' active' : '') + '" type="button" aria-label="' + (favored ? '取消收藏' : '收藏') + '" title="' + (favored ? '取消收藏' : '收藏') + '" data-favorite-id="' + esc(itemId) + '">' + (favored ? '★' : '☆') + '</button>';
      const tags = item.keywords
        ? '<div class="history-item-tags">' + item.keywords.split(/[、，,｜|]/).map(tag => tag.trim()).filter(Boolean).map(tag => '<span class="history-tag">' + esc(tag) + '</span>').join('') + '</div>'
        : '';
      return '<article class="history-item">' +
        '<div class="history-item-head">' +
          '<h4 class="history-item-title">' + title + '</h4>' +
          '<div class="history-item-side">' + [sourceMeta, score, favorite].filter(Boolean).join('') + '</div>' +
        '</div>' +
        takeaway +
        reason +
        '<div class="history-item-row">' + [tags].filter(Boolean).join('') + '</div>' +
      '</article>';
    }
    return '<div class="history-columns">' + columns.map(column => {
      return '<div class="history-column">' + column.map(renderCard).join('') + '</div>';
    }).join('') + '</div>';
  }

  function renderDetail(source, day){
    if (!day) {
      detailEl.innerHTML = '';
      emptyState.hidden = false;
      return;
    }
    emptyState.hidden = true;
    const intro = day.intro ? '<p class="history-detail-subtitle">' + esc(day.intro) + '</p>' : '';
    detailEl.innerHTML =
      '<header class="history-detail-header">' +
        '<h2>' + esc(day.brief_date) + '</h2>' +
        '<div class="history-detail-subtitle">' + esc(source.display_name) + ' · ' + esc(String(day.item_count)) + ' 条 · <a class="history-detail-raw" href="raw/' + esc(day.raw_file_name) + '">原始文本</a></div>' +
      '</header>' +
      '<div class="history-detail-body">' +
        '<section class="history-section-card">' +
          intro +
          renderItems(source, day, day.items) +
        '</section>' +
      '</div>';
    detailEl.querySelectorAll('[data-favorite-id]').forEach(btn => {
      btn.addEventListener('click', () => {
        const itemId = btn.getAttribute('data-favorite-id');
        const item = day.items.find(entry => getItemId(source, day, entry) === itemId);
        if (!item) return;
        toggleFavorite(itemId, {
          source_key: source.source_key,
          source_name: source.display_name,
          brief_date: day.brief_date,
          title: item.title,
          url: item.url || '',
          item_index: item.item_index,
        });
      });
    });
  }

  function render(){
    const resolved = resolveState();
    renderTabs(resolved.source ? resolved.source.source_key : '');
    if (!resolved.source) {
      directoryEl.innerHTML = '';
      detailEl.innerHTML = '';
      emptyState.hidden = false;
      return;
    }
    renderDirectory(resolved.source, resolved.day ? resolved.day.brief_date : '');
    renderDetail(resolved.source, resolved.day);
  }

  window.addEventListener('popstate', render);
  if (favoritesOnlyBtn) {
    favoritesOnlyBtn.addEventListener('click', () => {
      favoritesOnly = !favoritesOnly;
      updateFavoritesBadge();
      render();
    });
  }
  if (favoritesBtn) {
    favoritesBtn.addEventListener('click', () => {
      favoritesOnly = true;
      updateFavoritesBadge();
      render();
    });
  }
  const initial = resolveState();
  if (initial.source) {
    setStateInUrl(initial.source.source_key, initial.day ? initial.day.brief_date : '');
  }
  updateFavoritesBadge();
  render();
