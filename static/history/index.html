(function(){
  const FAVORITES_KEY = 'ai-daily-digest-favorites-v1';
  const tabsEl = document.getElementById('history-tabs');
  const sidebarTitleEl = document.getElementById('history-sidebar-title');
  const sidebarSubtitleEl = document.getElementById('history-sidebar-subtitle');
  const directoryEl = document.getElementById('history-directory');
  const detailEl = document.getElementById('history-detail');
  const emptyState = document.getElementById('history-empty');
  const favoritesBtn = document.getElementById('history-favorites-btn');
  const favoritesOnlyBtn = document.getElementById('history-favorites-only-btn');
  let favorites = loadFavorites();
  let favoritesOnly = false;

  function esc(value){
    return String(value ?? '').replace(/[&<>"']/g, function(ch){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
    });
  }

  function formatDateLabel(date){
    return date || '';
  }

  function loadFavorites(){
    try {
      const raw = window.localStorage.getItem(FAVORITES_KEY);
      if (!raw) return {};
      const parsed = JSON.parse(raw);
      return parsed && typeof parsed === 'object' ? parsed : {};
    } catch (err) {
      return {};
    }
  }

  function saveFavorites(){
    window.localStorage.setItem(FAVORITES_KEY, JSON.stringify(favorites));
  }

  function updateFavoritesBadge(){
    const count = Object.keys(favorites).length;
    if (favoritesBtn) favoritesBtn.textContent = '★ 收藏 ' + count;
    if (favoritesOnlyBtn) favoritesOnlyBtn.classList.toggle('active', favoritesOnly);
  }

  function getItemId(source, day, item){
    return [source.source_key, day.brief_date, item.item_index, item.url || item.title].join('::');
  }

  function isFavorite(itemId){
    return Boolean(favorites[itemId]);
  }

  function toggleFavorite(itemId, payload){
    if (favorites[itemId]) {
      delete favorites[itemId];
    } else {
      favorites[itemId] = payload;
    }
    saveFavorites();
    updateFavoritesBadge();
    render();
  }

  function getStateFromUrl(){
    const url = new URL(window.location.href);
    return {
      source: url.searchParams.get('source') || '',
      date: url.searchParams.get('date') || ''
    };
  }

  function setStateInUrl(sourceKey, date){
    const url = new URL(window.location.href);
    url.searchParams.set('source', sourceKey);
    if (date) {
      url.searchParams.set('date', date);
    } else {
      url.searchParams.delete('date');
    }
    window.history.replaceState({}, '', url.toString());
  }

  function resolveState(){
    const state = getStateFromUrl();
    const sources = HISTORY_APP_DATA.sources || [];
    let source = sources.find(s => s.source_key === state.source) || sources[0] || null;
    if (!source) return {source:null, day:null};
    let day = source.days.find(d => d.brief_date === state.date) || source.days[0] || null;
    return {source, day};
  }

  function renderTabs(activeSourceKey){
    tabsEl.innerHTML = '';
    (HISTORY_APP_DATA.sources || []).forEach(source => {
      const btn = document.createElement('button');
      btn.className = 'history-tab' + (source.source_key === activeSourceKey ? ' active' : '');
      btn.type = 'button';
      btn.textContent = source.display_name;
      btn.addEventListener('click', () => {
        const nextDay = (source.days && source.days[0]) ? source.days[0].brief_date : '';
        setStateInUrl(source.source_key, nextDay);
        render();
      });
      tabsEl.appendChild(btn);
    });
  }

  function renderDirectory(source, activeDate){
    sidebarTitleEl.textContent = source.display_name;
    sidebarSubtitleEl.textContent = source.day_count + ' 天归档';
    directoryEl.innerHTML = '';
    source.days.forEach(day => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'history-dir-item' + (day.brief_date === activeDate ? ' active' : '');
      btn.innerHTML = '<div class="history-dir-title">' + esc(formatDateLabel(day.brief_date)) + '</div>' +
        '<div class="history-dir-meta"><span>' + esc(String(day.item_count)) + ' 条</span></div>';
      btn.addEventListener('click', () => {
        setStateInUrl(source.source_key, day.brief_date);
        render();
      });
      directoryEl.appendChild(btn);
    });
  }

  function renderItems(source, day, items){
    if (!items || !items.length) {
      return '<p class="history-detail-subtitle">暂无条目。</p>';
    }
    const filteredItems = favoritesOnly
      ? items.filter(item => isFavorite(getItemId(source, day, item)))
      : items;
    if (!filteredItems.length) {
      return '<p class="history-detail-subtitle">当前筛选下暂无已收藏条目。</p>';
    }
    const midpoint = Math.ceil(filteredItems.length / 2);
    const columns = [filteredItems.slice(0, midpoint), filteredItems.slice(midpoint)];
    function renderCard(item){
      const itemId = getItemId(source, day, item);
      const favored = isFavorite(itemId);
      const title = item.url
        ? '<a href="' + esc(item.url) + '" target="_blank" rel="noopener noreferrer">' + esc(item.item_index + '. ' + item.title) + '</a>'
        : esc(item.item_index + '. ' + item.title);
      const takeaway = item.takeaway ? '<p><strong>看点：</strong>' + esc(item.takeaway) + '</p>' : '';
      const reason = item.reason && item.reason !== item.takeaway ? '<p><strong>推荐理由：</strong>' + esc(item.reason) + '</p>' : '';
      const sourceMeta = (source.source_type !== 'papers' && item.source_label) ? '<span class="history-item-source">' + esc(item.source_label) + '</span>' : '';
      const score = item.score ? '<span class="history-item-score">' + esc(item.score) + '</span>' : '';
      const favorite = '<button class="history-item-fav' + (favored ? ' active' : '') + '" type="button" aria-label="' + (favored ? '取消收藏' : '收藏') + '" title="' + (favored ? '取消收藏' : '收藏') + '" data-favorite-id="' + esc(itemId) + '">' + (favored ? '★' : '☆') + '</button>';
      const tags = item.keywords
        ? '<div class="history-item-tags">' + item.keywords.split(/[、，,｜|]/).map(tag => tag.trim()).filter(Boolean).map(tag => '<span class="history-tag">' + esc(tag) + '</span>').join('') + '</div>'
        : '';
      return '<article class="history-item">' +
        '<div class="history-item-head">' +
          '<h4 class="history-item-title">' + title + '</h4>' +
          '<div class="history-item-side">' + [sourceMeta, score, favorite].filter(Boolean).join('') + '</div>' +
        '</div>' +
        takeaway +
        reason +
        '<div class="history-item-row">' + [tags].filter(Boolean).join('') + '</div>' +
      '</article>';
    }
    return '<div class="history-columns">' + columns.map(column => {
      return '<div class="history-column">' + column.map(renderCard).join('') + '</div>';
    }).join('') + '</div>';
  }

  function renderDetail(source, day){
    if (!day) {
      detailEl.innerHTML = '';
      emptyState.hidden = false;
      return;
    }
    emptyState.hidden = true;
    const intro = day.intro ? '<p class="history-detail-subtitle">' + esc(day.intro) + '</p>' : '';
    detailEl.innerHTML =
      '<header class="history-detail-header">' +
        '<h2>' + esc(day.brief_date) + '</h2>' +
        '<div class="history-detail-subtitle">' + esc(source.display_name) + ' · ' + esc(String(day.item_count)) + ' 条 · <a class="history-detail-raw" href="raw/' + esc(day.raw_file_name) + '">原始文本</a></div>' +
      '</header>' +
      '<div class="history-detail-body">' +
        '<section class="history-section-card">' +
          intro +
          renderItems(source, day, day.items) +
        '</section>' +
      '</div>';
    detailEl.querySelectorAll('[data-favorite-id]').forEach(btn => {
      btn.addEventListener('click', () => {
        const itemId = btn.getAttribute('data-favorite-id');
        const item = day.items.find(entry => getItemId(source, day, entry) === itemId);
        if (!item) return;
        toggleFavorite(itemId, {
          source_key: source.source_key,
          source_name: source.display_name,
          brief_date: day.brief_date,
          title: item.title,
          url: item.url || '',
          item_index: item.item_index,
        });
      });
    });
  }

  function render(){
    const resolved = resolveState();
    renderTabs(resolved.source ? resolved.source.source_key : '');
    if (!resolved.source) {
      directoryEl.innerHTML = '';
      detailEl.innerHTML = '';
      emptyState.hidden = false;
      return;
    }
    renderDirectory(resolved.source, resolved.day ? resolved.day.brief_date : '');
    renderDetail(resolved.source, resolved.day);
  }

  window.addEventListener('popstate', render);
  if (favoritesOnlyBtn) {
    favoritesOnlyBtn.addEventListener('click', () => {
      favoritesOnly = !favoritesOnly;
      updateFavoritesBadge();
      render();
    });
  }
  if (favoritesBtn) {
    favoritesBtn.addEventListener('click', () => {
      favoritesOnly = true;
      updateFavoritesBadge();
      render();
    });
  }
  const initial = resolveState();
  if (initial.source) {
    setStateInUrl(initial.source.source_key, initial.day ? initial.day.brief_date : '');
  }
  updateFavoritesBadge();
  render();
})();
</script>
